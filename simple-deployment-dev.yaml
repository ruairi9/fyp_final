apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-microservice
  namespace: development
  labels:
    app: test-microservice
    environment: development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-microservice
  template:
    metadata:
      labels:
        app: test-microservice
        environment: development
    spec:
      nodeSelector:
        node-role: development
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: test-microservice
  namespace: development
spec:
  type: NodePort
  selector:
    app: test-microservice
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30501
    name: http
