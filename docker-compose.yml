version: '3.8'

services:
  sdos:
    build: .
    container_name: sdos-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "8080:8080"
      - "9000:9000"
      - "7000:7000"
      - "6001:6001"
    volumes:
      - ./k3s.yaml:/app/k3s.yaml:ro
      - ~/.vagrant.d:/root/.vagrant.d:ro
      - ./:/app/cluster:ro
      - sdos-data:/app/data
    environment:
      - KUBECONFIG=/app/k3s.yaml
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  sdos-data:
